function renderTree(node, container, depth = 0) {
  const div = document.createElement('div');
  const toggle = document.createElement('span');
  toggle.className = 'toggle';
  const label = document.createElement('span');
  label.textContent = node.text;
  
  const wrapper = document.createElement('div');
  wrapper.className = 'node ' + (node.cls || '');
  
  if (node.children && node.children.length > 0) {
    toggle.textContent = depth < 2 ? '▼ ' : '▶ ';
    wrapper.style.cursor = 'pointer';
    
    const childrenDiv = document.createElement('div');
    childrenDiv.className = 'children' + (depth < 2 ? ' open' : '');
    
    node.children.forEach(child => renderTree(child, childrenDiv, depth + 1));
    
    wrapper.appendChild(toggle);
    wrapper.appendChild(label);
    div.appendChild(wrapper);
    div.appendChild(childrenDiv);
    
    wrapper.onclick = function(e) {
      e.stopPropagation();
      const isOpen = childrenDiv.classList.contains('open');
      if (isOpen) {
        childrenDiv.classList.remove('open');
        toggle.textContent = '▶ ';
      } else {
        childrenDiv.classList.add('open');
        toggle.textContent = '▼ ';
      }
    };
  } else {
    toggle.textContent = '  ';
    wrapper.appendChild(toggle);
    wrapper.appendChild(label);
    div.appendChild(wrapper);
  }
  
  container.appendChild(div);
}
