// Core concepts
const coreConcepts=[
  {label:'参与者\nPlayers',x:0,y:0},
  {label:'规则\nRules',x:0,y:0},
  {label:'激励\nIncentives',x:0,y:0},
];

// Laws
const laws=[
  {label:'非对称性定律',en:'Asymmetry',x:0,y:0},
  {label:'升级定律',en:'Escalation',x:0,y:0},
  {label:'末世论收敛',en:'Eschatological Convergence',x:0,y:0},
  {label:'近因定律',en:'Proximity',x:0,y:0},
];

// Layout
function layout(){
  const cx=W/2, cy=H/2;
  // Center node
  const center={x:cx,y:cy,r:70};
  
  // Core concepts - inner ring
  const coreR=180;
  coreConcepts.forEach((c,i)=>{
    const a=-Math.PI/2+i*(Math.PI*2/3);
    c.x=cx+Math.cos(a)*coreR;
    c.y=cy+Math.sin(a)*coreR;
    c.r=42;
  });
  
  // Laws - second ring
  const lawR=300;
  laws.forEach((l,i)=>{
    const a=-Math.PI/4+i*(Math.PI*2/4);
    l.x=cx+Math.cos(a)*lawR;
    l.y=cy+Math.sin(a)*lawR;
    l.r=38;
  });
  
  // Phase nodes - outer ring
  const phaseR=460;
  phases.forEach((p,i)=>{
    const a=-Math.PI/2+i*(Math.PI*2/phases.length);
    p.x=cx+Math.cos(a)*phaseR;
    p.y=cy+Math.sin(a)*phaseR;
    p.r=52;
  });
  
  // Lecture nodes - fan out from phases
  const lectR=180;
  lectures.forEach((l,i)=>{
    const pi=phases.findIndex(p=>p.id===l.phase);
    const phase=phases[pi];
    const phaseIdx=lectures.filter(ll=>ll.phase===l.phase).indexOf(l);
    const count=lectures.filter(ll=>ll.phase===l.phase).length;
    const baseA=Math.atan2(phase.y-cy,phase.x-cx);
    const spread=Math.PI*0.35;
    const startA=baseA-spread/2;
    const step=count>1?spread/(count-1):0;
    const a=count>1?startA+step*phaseIdx:baseA;
    l.x=phase.x+Math.cos(a)*lectR;
    l.y=phase.y+Math.sin(a)*lectR;
    l.r=30;
  });
  
  return {center};
}

let layoutData;
let allNodes=[];
let allEdges=[];

function buildNodes(){
  layoutData=layout();
  allNodes=[];
  allEdges=[];
  
  // Center
  allNodes.push({type:'center',x:layoutData.center.x,y:layoutData.center.y,r:layoutData.center.r,label:'博弈论\nGame Theory',color:'#f59e0b',desc:'Prof. Jiang · Predictive History\n29讲完整课程系列'});
  
  // Core concepts
  coreConcepts.forEach(c=>{
    allNodes.push({type:'core',x:c.x,y:c.y,r:c.r,label:c.label,color:'#fbbf24'});
    allEdges.push({from:layoutData.center,to:c,color:'rgba(251,191,36,.3)',width:2});
  });
  
  // Laws
  laws.forEach(l=>{
    allNodes.push({type:'law',x:l.x,y:l.y,r:l.r,label:l.label,color:'#a78bfa'});
    allEdges.push({from:layoutData.center,to:l,color:'rgba(167,139,250,.25)',width:1.5,dash:[6,4]});
  });
  
  // Phases
  phases.forEach(p=>{
    allNodes.push({type:'phase',x:p.x,y:p.y,r:p.r,label:p.label,color:p.color,desc:p.sub+'\n'+p.desc});
    allEdges.push({from:layoutData.center,to:p,color:p.color+'40',width:2});
  });
  
  // Lectures
  lectures.forEach(l=>{
    const phase=phases.find(p=>p.id===l.phase);
    allNodes.push({type:'lecture',x:l.x,y:l.y,r:l.r,label:l.label,color:phase.color,desc:l.desc,topics:l.topics,en:l.en,lectNum:l.id});
    allEdges.push({from:phase,to:l,color:phase.color+'30',width:1});
  });
}

function draw(){
  ctx.clearRect(0,0,W,H);
  
  // Background gradient
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.7);
  bg.addColorStop(0,'#111827');
  bg.addColorStop(1,'#0a0e1a');
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);
  
  // Subtle grid
  ctx.strokeStyle='rgba(255,255,255,.03)';
  ctx.lineWidth=1;
  for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  
  ctx.save();
  ctx.translate(ox,oy);
  ctx.scale(scale,scale);
  
  // Draw edges
  allEdges.forEach(e=>{
    ctx.beginPath();
    ctx.strokeStyle=e.color;
    ctx.lineWidth=e.width/scale;
    if(e.dash)ctx.setLineDash(e.dash.map(d=>d/scale));
    else ctx.setLineDash([]);
    ctx.moveTo(e.from.x,e.from.y);
    // Curved line
    const mx=(e.from.x+e.to.x)/2;
    const my=(e.from.y+e.to.y)/2;
    const dx=e.to.x-e.from.x;
    const dy=e.to.y-e.from.y;
    const cx2=mx-dy*0.1;
    const cy2=my+dx*0.1;
    ctx.quadraticCurveTo(cx2,cy2,e.to.x,e.to.y);
    ctx.stroke();
  });
  
  // Draw nodes
  allNodes.forEach(n=>{
    const isHovered=hovered===n;
    const r=isHovered?n.r*1.15:n.r;
    
    // Glow
    if(n.type==='center'||n.type==='phase'||isHovered){
      const glow=ctx.createRadialGradient(n.x,n.y,r*0.5,n.x,n.y,r*2);
      glow.addColorStop(0,n.color+'30');
      glow.addColorStop(1,n.color+'00');
      ctx.fillStyle=glow;
      ctx.beginPath();
      ctx.arc(n.x,n.y,r*2,0,Math.PI*2);
      ctx.fill();
    }
    
    // Circle
    ctx.beginPath();
    ctx.arc(n.x,n.y,r,0,Math.PI*2);
    ctx.fillStyle=isHovered?n.color+'30':n.color+'15';
    ctx.fill();
    ctx.strokeStyle=isHovered?n.color:n.color+'80';
    ctx.lineWidth=isHovered?2.5:1.5;
    ctx.stroke();
    
    // Label
    ctx.fillStyle=isHovered?'#fff':n.color;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    
    if(n.type==='center'){
      ctx.font='bold 16px "Noto Sans SC"';
      const lines=n.label.split('\n');
      lines.forEach((line,i)=>{
        ctx.fillText(line,n.x,n.y+(i-(lines.length-1)/2)*20);
      });
    }else if(n.type==='phase'){
      ctx.font='bold 13px "Noto Sans SC"';
      ctx.fillText(n.label,n.x,n.y-6);
      ctx.font='10px "Noto Sans SC"';
      ctx.fillStyle=n.color+'99';
      ctx.fillText(n.sub,n.x,n.y+10);
    }else if(n.type==='law'){
      ctx.font='bold 11px "Noto Sans SC"';
      const lines=n.label.split('\n');
      lines.forEach((line,i)=>{
        ctx.fillText(line,n.x,n.y+(i-(lines.length-1)/2)*14);
      });
    }else if(n.type==='core'){
      ctx.font='bold 12px "Noto Sans SC"';
      const lines=n.label.split('\n');
      lines.forEach((line,i)=>{
        ctx.fillText(line,n.x,n.y+(i-(lines.length-1)/2)*16);
      });
    }else{
      ctx.font='bold 10px "Noto Sans SC"';
      ctx.fillText(n.label,n.x,n.y);
    }
  });
  
  ctx.restore();
}

// Hit test
function hitTest(mx,my){
  const x=(mx-ox)/scale;
  const y=(my-oy)/scale;
  for(let i=allNodes.length-1;i>=0;i--){
    const n=allNodes[i];
    const dx=x-n.x,dy=y-n.y;
    if(dx*dx+dy*dy<=n.r*n.r)return n;
  }
  return null;
}

// Events
canvas.addEventListener('mousedown',e=>{
  dragging=true;lastX=e.clientX;lastY=e.clientY;
});
canvas.addEventListener('mousemove',e=>{
  if(dragging){
    ox+=e.clientX-lastX;oy+=e.clientY-lastY;
    lastX=e.clientX;lastY=e.clientY;
    draw();
  }
  const n=hitTest(e.clientX,e.clientY);
  if(n!==hovered){
    hovered=n;
    canvas.style.cursor=n?'pointer':'grab';
    if(n){
      const tt=tooltip;
      tt.style.display='block';
      tt.style.left=Math.min(e.clientX+16,W-300)+'px';
      tt.style.top=Math.min(e.clientY+16,H-200)+'px';
      tt.querySelector('.tt-title').textContent=n.label.replace(/\n/g,' ');
      tt.querySelector('.tt-lect').textContent=n.lectNum||n.en||n.sub||'';
      let body=n.desc||'';
      if(n.topics)body+='\n\n核心主题：'+n.topics.join(' · ');
      tt.querySelector('.tt-body').textContent=body;
    }else{
      tooltip.style.display='none';
    }
    draw();
  }
});
canvas.addEventListener('mouseup',()=>{dragging=false});
canvas.addEventListener('mouseleave',()=>{dragging=false;hovered=null;tooltip.style.display='none';draw()});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const delta=e.deltaY>0?0.9:1.1;
  const mx=e.clientX,my=e.clientY;
  ox=mx-(mx-ox)*delta;
  oy=my-(my-oy)*delta;
  scale*=delta;
  scale=Math.max(0.2,Math.min(3,scale));
  draw();
},{passive:false});

// Touch support
let lastTouchDist=0;
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===1){
    dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
  }else if(e.touches.length===2){
    lastTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  }
});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&dragging){
    ox+=e.touches[0].clientX-lastX;oy+=e.touches[0].clientY-lastY;
    lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
    draw();
  }else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const delta=d/lastTouchDist;
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const my=(e.touches[0].clientY+e.touches[1].clientY)/2;
    ox=mx-(mx-ox)*delta;oy=my-(my-oy)*delta;
    scale*=delta;scale=Math.max(0.2,Math.min(3,scale));
    lastTouchDist=d;draw();
  }
},{passive:false});
canvas.addEventListener('touchend',()=>{dragging=false});

function zoomIn(){scale*=1.2;draw()}
function zoomOut(){scale/=1.2;draw()}
function resetView(){ox=0;oy=0;scale=1;draw()}

// Init
buildNodes();
resize();
// Center the view
ox=W/2;oy=H/2;scale=0.85;
draw();
</script>
</body>
</html>
